# Deploy image AI team build từ /Users/tan/Desktop/lab-w11/Capstone-Phase-2-CodeAI/demo/app
# (Dockerfile + main.py) — KHÔNG dùng terraform/ (vpc.tf, ecs.tf, alb.tf) của họ,
# vì đó là stack ECS/VPC riêng, không phải topology đã ký trong deployment-contract.md.
#
# TODO trước khi apply:
# 1. AI team (hoặc CDO) chạy `docker build` từ demo/app, push lên ECR (có thể tái
#    dùng repo "tf-3-ai-engine" họ đã tạo qua deploy_fixed.ps1, hoặc CDO tạo ECR
#    repo riêng trong modules/eks hoặc 1 module mới — quyết định ghi vào 08_adrs.md).
# 2. Thay <ECR_IMAGE_URI> bằng image thật.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-engine
  namespace: self-heal-system
  labels:
    app: ai-engine
spec:
  replicas: 2 # Min theo docs/04_deployment_design.md (AI deployment-contract §2.B)
  selector:
    matchLabels:
      app: ai-engine
  template:
    metadata:
      labels:
        app: ai-engine
    spec:
      serviceAccountName: ai-engine # TODO(INFRA-4 hoặc security): tạo IRSA ServiceAccount riêng
      containers:
        - name: ai-engine
          image: "<ECR_IMAGE_URI>:latest" # vd <account>.dkr.ecr.us-east-1.amazonaws.com/tf-3-ai-engine:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "500m"
              memory: "1024Mi"
            limits:
              cpu: "1000m"
              memory: "2048Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
