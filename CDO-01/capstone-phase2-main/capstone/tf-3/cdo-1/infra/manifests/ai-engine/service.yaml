# ClusterIP — đúng theo deployment-contract.md mục 2.C (In-Cluster Service,
# http://ai-engine.self-heal-system.svc.cluster.local:8080/, Local Trust/mTLS).
# KHÔNG tạo LoadBalancer/Ingress public cho service này.
apiVersion: v1
kind: Service
metadata:
  name: ai-engine
  namespace: self-heal-system
spec:
  type: ClusterIP
  selector:
    app: ai-engine
  ports:
    - port: 8080
      targetPort: 8080
