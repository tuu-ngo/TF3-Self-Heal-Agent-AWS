apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-engine
  namespace: self-heal-system
  labels:
    app: ai-engine
    selfheal.ai/component: ai-engine
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-engine
  template:
    metadata:
      labels:
        app: ai-engine
        selfheal.ai/component: ai-engine
    spec:
      serviceAccountName: ai-engine
      containers:
        - name: ai-engine-skeleton
          image: python:3.12-slim
          imagePullPolicy: IfNotPresent
          command:
            - python
            - /app/server.py
          ports:
            - name: http
              containerPort: 8080
          volumeMounts:
            - name: app-src
              mountPath: /app
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
      volumes:
        - name: app-src
          configMap:
            name: ai-engine-skeleton-src
