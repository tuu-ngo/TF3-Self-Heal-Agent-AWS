apiVersion: apps/v1
kind: Deployment
metadata:
  name: cdo-sample-api
  namespace: tenant-a
  labels:
    app: cdo-sample-api
    tenant_id: tenant-a
    selfheal.ai/service: checkout-svc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cdo-sample-api
  template:
    metadata:
      labels:
        app: cdo-sample-api
        tenant_id: tenant-a
        selfheal.ai/service: checkout-svc
    spec:
      containers:
        - name: podinfo
          image: ghcr.io/stefanprodan/podinfo:6.14.0
          imagePullPolicy: IfNotPresent
          env:
            - name: PODINFO_UI_MESSAGE
              value: "CDO-02 tenant-a checkout-svc sample workload"
            - name: PODINFO_UI_COLOR
              value: "#1f6feb"
          ports:
            - name: http
              containerPort: 9898
            - name: metrics
              containerPort: 9797
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: cdo-sample-api
  namespace: tenant-a
  labels:
    app: cdo-sample-api
    tenant_id: tenant-a
spec:
  selector:
    app: cdo-sample-api
  ports:
    - name: http
      port: 80
      targetPort: http
    - name: metrics
      port: 9797
      targetPort: metrics
