apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: tenant-b
  labels:
    app: notification-service
    tenant_id: tenant-b
    selfheal.ai/service: notification-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
        tenant_id: tenant-b
        selfheal.ai/service: notification-service
    spec:
      containers:
        - name: podinfo
          image: ghcr.io/stefanprodan/podinfo:6.14.0
          imagePullPolicy: IfNotPresent
          env:
            - name: PODINFO_UI_MESSAGE
              value: "CDO-02 tenant-b notification-service sample workload"
            - name: PODINFO_UI_COLOR
              value: "#2ea44f"
          ports:
            - name: http
              containerPort: 9898
            - name: metrics
              containerPort: 9797
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: tenant-b
  labels:
    app: notification-service
    tenant_id: tenant-b
spec:
  selector:
    app: notification-service
  ports:
    - name: http
      port: 80
      targetPort: http
    - name: metrics
      port: 9797
      targetPort: metrics
