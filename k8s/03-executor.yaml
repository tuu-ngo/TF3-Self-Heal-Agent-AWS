apiVersion: apps/v1
kind: Deployment
metadata:
  name: cdo-executor
  namespace: self-heal-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cdo-self-heal-controller
  template:
    metadata:
      labels:
        app: cdo-self-heal-controller
    spec:
      serviceAccountName: tf3-cdo-controller
      containers:
        - name: executor
          image: REPLACE_WITH_ECR_URL:latest
          command: ["python", "run_scenarios.py"]
          env:
            - name: AI_BASE_URL
              value: "http://ai-engine.self-heal-system.svc.cluster.local:8080"
            - name: CDO_K8S_MOCK
              value: "false"
            - name: AWS_REGION
              value: "ap-southeast-1"
            - name: CDO_AUDIT_BUCKET
              value: REPLACE_WITH_AUDIT_BUCKET
            - name: CDO_IDEMPOTENCY_TABLE
              value: "cdo-idempotency-dev"
            - name: CDO_TENANT_NAMESPACES
              value: "tenant-a,tenant-b"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
