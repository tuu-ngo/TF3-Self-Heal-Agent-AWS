# ServiceAccount cho CDO executor — IRSA annotation điền sau khi terraform apply
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tf3-cdo-controller
  namespace: self-heal-system
  annotations:
    eks.amazonaws.com/role-arn: REPLACE_WITH_EXECUTOR_ROLE_ARN
---
# Role cho phép executor đọc/patch deployment trong tenant-a
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cdo-executor-role
  namespace: tenant-a
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "patch", "update"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cdo-executor-binding
  namespace: tenant-a
subjects:
  - kind: ServiceAccount
    name: tf3-cdo-controller
    namespace: self-heal-system
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: cdo-executor-role
---
# Role cho phép executor đọc/patch deployment trong tenant-b
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cdo-executor-role
  namespace: tenant-b
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "patch", "update"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cdo-executor-binding
  namespace: tenant-b
subjects:
  - kind: ServiceAccount
    name: tf3-cdo-controller
    namespace: self-heal-system
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: cdo-executor-role
