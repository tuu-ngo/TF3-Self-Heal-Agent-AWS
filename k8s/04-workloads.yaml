# podinfo tenant-a — workload inject lỗi thật (S-01, S-04, S-07...)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cdo-sample-api
  namespace: tenant-a
spec:
  replicas: 1
  selector:
    matchLabels:
      app: checkout-svc
  template:
    metadata:
      labels:
        app: checkout-svc
    spec:
      containers:
        - name: podinfo
          image: ghcr.io/stefanprodan/podinfo:6.14.0
          ports:
            - containerPort: 9898
            - containerPort: 9797  # metrics Prometheus
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /readyz
              port: 9898
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: checkout-svc
  namespace: tenant-a
spec:
  selector:
    app: checkout-svc
  ports:
    - port: 80
      targetPort: 9898
---
