# Mock AI server — dùng trong lúc chờ AI team bàn giao image thật
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-engine
  namespace: self-heal-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-engine
  template:
    metadata:
      labels:
        app: ai-engine
    spec:
      containers:
        - name: ai-engine
          image: REPLACE_WITH_ECR_URL:latest
          command: ["python", "mock_ai_server.py"]
          ports:
            - containerPort: 8080
          env:
            - name: CDO_K8S_MOCK
              value: "true"
---
apiVersion: v1
kind: Service
metadata:
  name: ai-engine
  namespace: self-heal-system
spec:
  selector:
    app: ai-engine
  ports:
    - port: 8080
      targetPort: 8080
