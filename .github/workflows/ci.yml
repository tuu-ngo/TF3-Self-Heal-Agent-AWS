name: CI — 4 Quality Gates

# 4 cửa ải (WORK_RULE §I): ruff + pytest (+coverage) + tfsec + gitleaks.
# Đặt cả 4 job làm "Required status checks" trong Branch protection của `main`.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  # ---------- Cửa 1a — Python lint ----------
  ruff:
    name: "Cửa 1 · ruff (Python lint)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        with:
          src: executor          # ruff check executor/ (config: executor/ruff.toml)

  # ---------- Cửa 2 — Unit test + coverage ----------
  pytest:
    name: "Cửa 2 · pytest (coverage ≥70%)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r executor/requirements.txt
          pip install pytest pytest-cov
      - name: pytest + coverage
        working-directory: executor
        env:
          CDO_K8S_MOCK: "true"   # không gọi cloud/cluster thật trong CI
        run: |
          pytest -q \
            --cov=safety_gate \
            --cov-report=term-missing \
            --cov-fail-under=70
          # Khi viết thêm test: mở rộng --cov (vd --cov=safety_gate --cov=pre_decide_gate ...)

  # ---------- Cửa 1b — IaC security scan ----------
  tfsec:
    name: "Cửa 1 · tfsec (IaC security)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Chạy tfsec bằng binary pinned để kiểm soát flag chính xác (action input không ổn định).
      # --minimum-severity CRITICAL: chỉ FAIL ở CRITICAL (DoD "no CRITICAL"; HIGH/MEDIUM = sandbox trade-off).
      # --exclude-downloaded-modules: bỏ qua CRITICAL của module upstream (EKS/VPC egress 0.0.0.0/0 — chuẩn AWS).
      - name: Install & run tfsec
        run: |
          curl -sSL -o tfsec https://github.com/aquasecurity/tfsec/releases/download/v1.28.11/tfsec-linux-amd64
          chmod +x tfsec
          ./tfsec infra --minimum-severity CRITICAL --exclude-downloaded-modules --no-color

  # ---------- Cửa 1c — Secret scan ----------
  gitleaks:
    name: "Cửa 1 · gitleaks (secret scan)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0        # quét toàn bộ lịch sử commit
      # Chạy binary trực tiếp để chắc chắn dùng .gitleaks.toml (action v2 không ổn định với config)
      # + tránh cảnh báo Node20. Lệnh y hệt đã test local → 0 leak.
      - name: Install & run gitleaks
        run: |
          curl -sSL -o gitleaks.tar.gz https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          ./gitleaks detect --source=. --config=.gitleaks.toml --redact --no-banner
